<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List PWI</title>
    <!--CSS-->
    <link rel="stylesheet" href="CSS/style.css">
    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"
        defer></script>
    <!--font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--JS-->
    <script src="JS/script.js" defer></script>
</head>

<body>
    <div class="todo-container">
        <header>
            <img src="img/Logo.jpg" width="250" height="250" alt="Logotipo">
        </header>
        <form id="todo-form">
            <label for="todo-input">O que você vai fazer?:</label>
            <div class="form-control">
                <input type="text" id="todo-input" placeholder="O que você vai fazer?">
                <button type="submit" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
        </form>
        <form id="edit-form" class="hide">
            <label for="edit-input">Edite a sua tarefa:</label>
            <div class="form-control">
                <input type="text" id="edit-input">
                <button type="submit" class="btn btn-outline-success">
                    <i class="fa-regular fa-circle-check"></i>
                </button>
            </div>
            <button type="button" id="cancel-edit-btn" class="btn btn-outline-danger">Cancelar</button>
        </form>
        <div id="toolbar">
            <div id="search">
                <label for="search-input">Pesquisar:</label>
                <form>
                    <input type="text" id="search-input" placeholder="Buscar">
                    <button type="button" class="btn btn-outline-danger">
                        <i class="fa-solid fa-delete-left"></i>
                    </button>
                </form>
            </div>
            <div id="filter">
                <h4>Filtrar:</h4>
                <select id="filter-select">
                    <option value="all">Todos</option>
                    <option value="done">Feitos</option>
                    <option value="todo">A fazer</option>
                </select>
            </div>
        </div>
        <div id="todo-list">
        </div>
        <div id=id="counter-section">
            <hr>
            <div class="counter-container text-center mt-3 mb-2">
                <div id="task-counters">
                    <strong>Tarefas feitas:</strong> <span id="completed-counter">0</span> |
                    <strong>Tarefas a fazer:</strong> <span id="uncompleted-counter">0</span>
                </div>
            </div>
        </div>
</body>

</html>
